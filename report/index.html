<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>의정보고서 비서</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--navy:#1f3864;--bg:#f4f6fa;--line:#dde3ee;--acc:#3d6cb9}
*{box-sizing:border-box}body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;margin:0;background:var(--bg);color:#222}
header{background:var(--navy);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
header h1{margin:0;font-size:19px}header .sub{font-size:11.5px;opacity:.8}
header a{color:#cdd9f2;font-size:12px;text-decoration:none}
nav{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--line);padding:0 20px}
nav .tab{padding:12px 18px;cursor:pointer;font-size:14px;border-bottom:3px solid transparent}
nav .tab.on{border-color:var(--navy);color:var(--navy);font-weight:700}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
.panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
.panel h2{margin:0 0 10px;font-size:15px;color:var(--navy)}
.ctrl{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
select,button,input,textarea,label.file{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
button{background:var(--navy);color:#fff;border:none;cursor:pointer}
button.ghost{background:#eef2fa;color:var(--navy)}
label.file{cursor:pointer;color:var(--navy);font-weight:700}label.file input{display:none}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:6px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:10px}
.form .full{grid-column:1/-1}
.form label{display:block;font-size:11.5px;color:#556;margin-bottom:3px}
.form input,.form select,.form textarea{width:100%}
textarea{resize:vertical;min-height:54px}
.empty{padding:44px;text-align:center;color:#889;background:#fff;border:1px dashed var(--line);border-radius:10px;line-height:1.8}
.noprint{font-size:12px;color:#667;margin-bottom:8px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
th{background:#e8edf7;color:var(--navy);padding:8px;border:1px solid var(--line)}
td{padding:7px 8px;border:1px solid var(--line);vertical-align:top}td a{color:var(--acc)}
td .del{background:#fde3e3;color:#a12626;border:none;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer}
.share{max-width:800px;margin:0 auto;background:#fff;padding:36px 28px;font-size:13px;line-height:1.6}
.share h1{text-align:center;color:var(--navy);font-size:22px;margin:0 0 2px}
.share .ssub{text-align:center;color:#555;font-size:12px;border-bottom:2px solid var(--navy);padding-bottom:10px;margin-bottom:18px}
.share h2{color:var(--navy);font-size:15px;border-left:4px solid var(--navy);padding-left:8px;margin:22px 0 8px}
.share h3{color:#333;font-size:13px;margin:14px 0 4px}
.share .none{color:#888;font-size:12px}
.share[contenteditable]{outline:none}
.stat{display:flex;gap:8px;margin:8px 0}.stat div{flex:1;text-align:center;background:#f2f5fb;border-radius:6px;padding:8px;font-size:12px}.stat b{display:block;font-size:18px;color:var(--navy)}
.bar{height:8px;background:#e8ecf5;border-radius:4px;margin:6px 0 10px}.bar i{display:block;height:8px;border-radius:4px;background:var(--acc)}
.sfoot{margin-top:28px;font-size:11px;color:#777;border-top:1px solid #ddd;padding-top:8px}
footer{font-size:11px;color:#889;padding:16px 24px;text-align:center}
@media print{header,nav,.ctrl,.noprint,footer{display:none!important}.wrap{padding:0;max-width:none}.share{padding:0}body{background:#fff}}
</style></head><body>
<header>
  <div><h1>의정보고서 비서</h1><div class="sub">의원별 자료 입력·누적 → 연도별·전반기·후반기 의정보고서</div></div>
  <a href="../">← 포털로</a>
</header>
<nav>
  <div class="tab on" id="t_in" onclick="go('입력')">자료 입력</div>
  <div class="tab" id="t_rp" onclick="go('보고서')">보고서 만들기</div>
</nav>
<div class="wrap" id="view"></div>
<footer>데이터는 이 브라우저(localStorage)에만 저장됩니다 ｜ 다른 컴퓨터로 옮길 땐 [백업 저장]→[백업 불러오기] ｜ 민원인 정보는 비식별(이니셜·유형만) 입력</footer>
<script>
// ── 저장소 ──────────────────────────────────────────────
const KEY="uijeong_report_v1";
const SHEETS=["공약이행","의회활동","민원처리","보도홍보"];
let DB=load(), cur="입력", mem="", typ="의회활동";
function load(){
  try{const d=JSON.parse(localStorage.getItem(KEY));if(d&&d.rows)return d}catch(e){}
  return {members:[],rows:{"공약이행":[],"의회활동":[],"민원처리":[],"보도홍보":[]}};
}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function members(){return [...new Set(DB.members.concat(SHEETS.flatMap(n=>DB.rows[n].map(r=>r[0]))))].filter(x=>x)}

// ── 공통 ────────────────────────────────────────────────
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const fmt=v=>/^https?:\/\//.test(String(v))?'<a href="'+esc(v)+'" target="_blank" rel="noopener">원문</a>':esc(v);
const el=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
function go(t){cur=t;el("t_in").classList.toggle("on",t==="입력");el("t_rp").classList.toggle("on",t==="보고서");render()}
function TBL(hd,rows,empty){return rows.length?'<table><tr>'+hd.map(x=>'<th>'+x+'</th>').join("")+'</tr>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+(String(c).startsWith("<button")?c:fmt(c==null?"":c))+'</td>').join("")+'</tr>').join("")+'</table>':'<p class="none">'+empty+'</p>'}

// ── 입력 폼 정의: 유형별 필드와 대장 행(열 배치) 매핑 ──────
// 행 배치는 의정활동대장.xlsx와 동일 (엑셀 일괄 불러오기와 호환)
const FORMS={
  "의회활동":{fields:[
      {k:"일자",t:"date"},{k:"유형",t:"select",o:["상임위질의","5분발언","도정질문","조례발의","토론회·간담회","현장방문","기타"]},
      {k:"제목·안건",t:"text",full:1},{k:"원문 링크",t:"text",full:1,ph:"https:// (회의록·의안 링크)"}],
    row:v=>[mem,v["일자"],v["유형"],v["제목·안건"],"","","",v["원문 링크"],""],
    list:{hd:["일자","유형","제목·안건","원문"],cols:[1,2,3,7],date:1}},
  "공약이행":{fields:[
      {k:"공약명",t:"text",full:1},{k:"분야",t:"select",o:["문화","체육","관광","교육","교통","복지","경제","환경","안전","기타"]},
      {k:"상태",t:"select",o:["구상","추진중","일부이행","완료","보류"]},
      {k:"최근 추진내용",t:"textarea",full:1,ph:"예) 2026-07-01: 부지 검토 착수"},{k:"다음 조치",t:"text",full:1}],
    row:v=>[mem,"",v["공약명"],v["분야"],"","","",v["상태"],v["최근 추진내용"],v["다음 조치"],"",today()],
    list:{hd:["공약명","분야","상태","최근 추진내용"],cols:[2,3,7,8]}},
  "민원처리":{fields:[
      {k:"접수일",t:"date"},{k:"유형",t:"select",o:["교통","문화","체육","환경","복지","도로·시설","행정","기타"]},
      {k:"상태",t:"select",o:["접수","검토","부서이송","처리중","회신완료"]},
      {k:"내용(비식별)",t:"textarea",full:1,ph:"민원인 실명 대신 이니셜·유형만 기록"}],
    row:v=>[mem,v["접수일"],"",v["유형"],v["내용(비식별)"],"",v["상태"],"","","",""],
    list:{hd:["접수일","유형","내용","상태"],cols:[1,3,4,6],date:1}},
  "보도홍보":{fields:[
      {k:"일자",t:"date"},{k:"구분",t:"select",o:["보도자료","인터뷰","기고","방송","SNS","기타"]},
      {k:"제목",t:"text",full:1},{k:"매체",t:"text"},{k:"링크",t:"text",ph:"https://"}],
    row:v=>[mem,v["일자"],v["구분"],v["제목"],v["매체"],v["링크"],""],
    list:{hd:["일자","구분","제목","매체"],cols:[1,2,3,4],date:1}},
};

// ── 자료 입력 화면 ──────────────────────────────────────
function inputView(){
  const ms=members(); if(!mem&&ms.length)mem=ms[0];
  let h='<div class="ctrl">'
    +'<select id="i_m" onchange="mem=this.value;render()">'+(ms.length?"":'<option value="">의원 없음</option>')+ms.map(m=>'<option'+(m===mem?" selected":"")+'>'+esc(m)+'</option>').join("")+'</select>'
    +'<button class="ghost" onclick="addMember()">➕ 의원 등록</button>'
    +'<span style="flex:1"></span>'
    +'<button class="ghost" onclick="exportJson()">💾 백업 저장</button>'
    +'<label class="file">📥 백업 불러오기<input type="file" accept=".json" onchange="importJson(this)"></label>'
    +'<label class="file">📂 대장 엑셀 가져오기<input type="file" accept=".xlsx" onchange="loadXlsx(this)"></label>'
    +'</div>';
  if(!ms.length)return h+'<div class="empty"><b>➕ 의원 등록</b>으로 담당 의원을 먼저 등록하세요.<br>기존 의정활동대장.xlsx가 있다면 <b>📂 대장 엑셀 가져오기</b>로 한 번에 불러올 수 있습니다.</div>';
  h+='<div class="chips">'+Object.keys(FORMS).map(t=>'<div class="chip'+(t===typ?" on":"")+'" onclick="typ=\''+t+'\';render()">'+t+'</div>').join("")+'</div>';
  const F=FORMS[typ];
  h+='<div class="panel"><h2>'+esc(mem)+' ｜ '+typ+' 입력</h2><div class="form">'
    +F.fields.map(f=>'<div'+(f.full?' class="full"':'')+'><label>'+f.k+'</label>'
      +(f.t==="select"?'<select id="f_'+f.k+'">'+f.o.map(o=>'<option>'+o+'</option>').join("")+'</select>'
       :f.t==="textarea"?'<textarea id="f_'+f.k+'" placeholder="'+(f.ph||"")+'"></textarea>'
       :'<input type="'+(f.t==="date"?"date":"text")+'" id="f_'+f.k+'" value="'+(f.t==="date"?today():"")+'" placeholder="'+(f.ph||"")+'">')
      +'</div>').join("")
    +'</div><button onclick="addRecord()">저장</button></div>';
  // 최근 입력 목록 (해당 의원·유형)
  const L=F.list, rows=DB.rows[typ], mine=[];
  rows.forEach((r,i)=>{if(r[0]===mem)mine.push([i,r])});
  mine.sort((a,b)=>String(b[1][1]).localeCompare(String(a[1][1])));
  h+='<div class="panel"><h2>입력된 '+typ+' ('+mine.length+'건)</h2>'
    +TBL(L.hd.concat(""),mine.slice(0,50).map(([i,r])=>L.cols.map(c=>r[c]).concat('<button class="del" onclick="delRecord(\''+typ+'\','+i+')">삭제</button>')),"아직 입력된 기록이 없습니다.")+'</div>';
  return h;
}
function addMember(){
  const n=prompt("의원 성함을 입력하세요 (예: 강웅철)");
  if(!n)return; const v=n.trim();
  if(v&&!DB.members.includes(v)){DB.members.push(v);mem=v;save()}else if(v){mem=v}
  render();
}
function addRecord(){
  const F=FORMS[typ], v={};
  for(const f of F.fields){v[f.k]=el("f_"+f.k).value.trim()}
  const need=F.fields.find(f=>f.t!=="select"&&!v[f.k]&&f.k!=="원문 링크"&&f.k!=="링크"&&f.k!=="매체"&&f.k!=="다음 조치");
  if(need){alert(need.k+"을(를) 입력해 주세요.");return}
  DB.rows[typ].push(F.row(v)); save(); render();
}
function delRecord(sheet,i){
  if(!confirm("이 기록을 삭제할까요?"))return;
  DB.rows[sheet].splice(i,1); save(); render();
}

// ── 백업 / 가져오기 ─────────────────────────────────────
function exportJson(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,1)],{type:"application/json"}));
  a.download="의정보고서_백업_"+today()+".json"; a.click();
}
function importJson(inp){
  const f=inp.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{try{const d=JSON.parse(e.target.result);
    if(!d.rows)throw 0;
    if(!confirm("백업 파일로 현재 데이터를 교체할까요?\n(현재 브라우저의 입력 내용은 사라집니다)"))return;
    DB=d; save(); render();
  }catch(err){alert("백업 파일 형식이 아닙니다.")}};
  rd.readAsText(f,"utf-8"); inp.value="";
}
function cellDate(v){
  if(v==null||v==="")return "";
  if(v instanceof Date)return v.toISOString().slice(0,10);
  if(typeof v==="number"){return new Date(Math.round((v-25569)*86400*1000)).toISOString().slice(0,10)}
  return String(v).trim().slice(0,10);
}
function loadXlsx(inp){
  const f=inp.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
    let n=0;
    SHEETS.forEach(s=>{
      const ws=wb.Sheets[s]; if(!ws)return;
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}).slice(1)
        .map(r=>r.map((c,i)=>i===1&&s!=="공약이행"?cellDate(c):(c instanceof Date?c.toISOString().slice(0,10):String(c).trim())))
        .filter(r=>r.some(v=>v!==""));
      const known=new Set(DB.rows[s].map(r=>r.join("|")));
      rows.forEach(r=>{if(!known.has(r.join("|"))){DB.rows[s].push(r);n++}});
    });
    save(); render(); alert("엑셀에서 "+n+"건을 가져왔습니다 (중복 제외).");
  };
  rd.readAsArrayBuffer(f); inp.value="";
}

// ── 보고서 화면 ─────────────────────────────────────────
const PERIODS=(()=>{const a=[["전체 임기(2026.7~2030.6)","2026-07-01","2030-06-30"],["전반기(2026.7~2028.6)","2026-07-01","2028-06-30"],["후반기(2028.7~2030.6)","2028-07-01","2030-06-30"]];for(let y=2026;y<=2030;y++)a.push([y+"년",y+"-01-01",y+"-12-31"]);return a})();
let rp_m="", rp_p=0;
function reportView(){
  const ms=members();
  let h='<div class="ctrl">'
    +'<select id="b_m" onchange="rp_m=this.value;render()"><option value="">의원 선택</option>'+ms.map(m=>'<option'+(m===rp_m?" selected":"")+'>'+esc(m)+'</option>').join("")+'</select>'
    +'<select id="b_p" onchange="rp_p=+this.value;render()">'+PERIODS.map((p,i)=>'<option value="'+i+'"'+(i===rp_p?" selected":"")+'>'+p[0]+'</option>').join("")+'</select>'
    +'<button onclick="print()">인쇄 / PDF 저장</button></div>';
  if(!ms.length)return h+'<div class="empty">먼저 [자료 입력] 탭에서 의원 등록과 자료 입력을 해주세요.</div>';
  if(!rp_m)return h+'<div class="empty">의원과 기간을 선택하면 의정보고서가 표시됩니다.<br>연도별·전반기·후반기·전체 임기 단위로 집계됩니다.</div>';
  const m=rp_m,[plabel,ps,pe]=PERIODS[rp_p];
  const inR=d=>{d=String(d).slice(0,10);return d>=ps&&d<=pe};
  const R=DB.rows;
  const acts=R["의회활동"].filter(r=>r[0]===m&&inR(r[1])).sort((a,b)=>String(a[1]).localeCompare(String(b[1])));
  const pl=R["공약이행"].filter(r=>r[0]===m);
  const mws=R["민원처리"].filter(r=>r[0]===m&&inR(r[1]));
  const mdone=mws.filter(r=>r[6]==="회신완료").length;
  const mrate=mws.length?Math.round(mdone/mws.length*100):0;
  const prs=R["보도홍보"].filter(r=>r[0]===m&&inR(r[1])).sort((a,b)=>String(a[1]).localeCompare(String(b[1])));
  const stat={};["완료","일부이행","추진중","구상","보류"].forEach(s=>stat[s]=pl.filter(r=>r[7]===s).length);
  const prate=pl.length?Math.round((stat["완료"]+stat["일부이행"]*.5)/pl.length*100):0;
  const atype={};acts.forEach(r=>{const t=r[2]||"기타";atype[t]=(atype[t]||0)+1});
  const mtype={};mws.forEach(r=>{const t=r[3]||"기타";mtype[t]=(mtype[t]||0)+1});
  return h+'<div class="noprint">본문을 클릭해 문구를 바로 고칠 수 있습니다. 고친 그대로 [인쇄 / PDF 저장]에 반영됩니다.</div>'
    +'<div class="share" contenteditable="true" spellcheck="false">'
    +'<h1>의정활동 보고서</h1><div class="ssub">'+esc(m)+' 의원 ｜ '+esc(plabel)+' ｜ 경기도의회 ｜ 작성: 정책지원관</div>'
    +'<h2>1. 활동 총괄</h2><div class="stat"><div><b>'+acts.length+'</b>의회 활동(건)</div><div><b>'+pl.length+'</b>공약(건)</div><div><b>'+mws.length+'</b>민원 접수(건)</div><div><b>'+prs.length+'</b>언론·홍보(건)</div></div>'
    +TBL(["의회활동 유형","건수"],Object.entries(atype),"기간 내 의회 활동 기록 없음")
    +'<h2>2. 공약 이행 현황</h2><div class="stat">'+["완료","일부이행","추진중","구상","보류"].map(s=>'<div><b>'+stat[s]+'</b>'+s+'</div>').join("")+'</div>'
    +(pl.length?'<div style="font-size:12px">종합 이행률 '+prate+'% (완료 100%·일부이행 50% 가중)</div><div class="bar"><i style="width:'+prate+'%"></i></div>':'')
    +TBL(["공약","분야","상태","최근 추진내용 / 다음 조치"],pl.map(r=>[r[2],r[3],r[7],(r[8]||"-")+(r[9]?" / 다음: "+r[9]:"")]),"공약 기록 없음")
    +'<h2>3. 의회 활동</h2>'+(acts.length?Object.keys(atype).map(t=>'<h3>'+esc(t)+' ('+atype[t]+'건)</h3>'+TBL(["일자","제목·안건","원문"],acts.filter(r=>(r[2]||"기타")===t).map(r=>[r[1],r[3],r[7]||"-"]),"")).join(""):'<p class="none">기간 내 의회 활동 기록 없음</p>')
    +'<h2>4. 민원 처리 (비식별 통계)</h2><div class="stat"><div><b>'+mws.length+'</b>접수</div><div><b>'+mdone+'</b>회신완료</div><div><b>'+mrate+'%</b>처리율</div></div>'
    +TBL(["유형","건수"],Object.entries(mtype),"기간 내 민원 기록 없음")
    +'<h2>5. 언론·홍보</h2>'+TBL(["일자","구분","제목","매체"],prs.map(r=>[r[1],r[2],r[3],r[4]]),"기간 내 보도 기록 없음")
    +'<div class="sfoot">본 자료는 의정보고서 비서에 입력된 기록으로 생성된 초안입니다. ｜ 생성일 '+today()+'</div></div>';
}

function render(){el("view").innerHTML=cur==="입력"?inputView():reportView()}
render();
</script>
</body></html>
