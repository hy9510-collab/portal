<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>의정보고서 비서</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--navy:#1f3864;--bg:#f4f6fa;--line:#dde3ee;--acc:#3d6cb9}
*{box-sizing:border-box}body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;margin:0;background:var(--bg);color:#222}
header{background:var(--navy);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
header h1{margin:0;font-size:19px}header .sub{font-size:11.5px;opacity:.8}
header a{color:#cdd9f2;font-size:12px;text-decoration:none}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
.ctrl{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
select,button,label.file{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
button{background:var(--navy);color:#fff;border:none;cursor:pointer}
label.file{cursor:pointer;color:var(--navy);font-weight:700}
label.file input{display:none}
.empty{padding:44px;text-align:center;color:#889;background:#fff;border:1px dashed var(--line);border-radius:10px;line-height:1.8}
.noprint{font-size:12px;color:#667;margin-bottom:8px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
th{background:#e8edf7;color:var(--navy);padding:8px;border:1px solid var(--line)}
td{padding:7px 8px;border:1px solid var(--line);vertical-align:top}td a{color:var(--acc)}
.share{max-width:800px;margin:0 auto;background:#fff;padding:36px 28px;font-size:13px;line-height:1.6}
.share h1{text-align:center;color:var(--navy);font-size:22px;margin:0 0 2px}
.share .ssub{text-align:center;color:#555;font-size:12px;border-bottom:2px solid var(--navy);padding-bottom:10px;margin-bottom:18px}
.share h2{color:var(--navy);font-size:15px;border-left:4px solid var(--navy);padding-left:8px;margin:22px 0 8px}
.share h3{color:#333;font-size:13px;margin:14px 0 4px}
.share .none{color:#888;font-size:12px}
.share[contenteditable]{outline:none}
.stat{display:flex;gap:8px;margin:8px 0}.stat div{flex:1;text-align:center;background:#f2f5fb;border-radius:6px;padding:8px;font-size:12px}.stat b{display:block;font-size:18px;color:var(--navy)}
.bar{height:8px;background:#e8ecf5;border-radius:4px;margin:6px 0 10px}.bar i{display:block;height:8px;border-radius:4px;background:var(--acc)}
.sfoot{margin-top:28px;font-size:11px;color:#777;border-top:1px solid #ddd;padding-top:8px}
footer{font-size:11px;color:#889;padding:16px 24px;text-align:center}
@media print{header,.ctrl,.noprint,footer{display:none!important}.wrap{padding:0;max-width:none}.share{padding:0}body{background:#fff}}
</style></head><body>
<header>
  <div><h1>의정보고서 비서</h1><div class="sub">의정활동대장(엑셀) → 연도별·전반기·후반기 의정보고서</div></div>
  <a href="../">← 포털로</a>
</header>
<div class="wrap">
  <div class="ctrl">
    <label class="file">📂 대장 엑셀 불러오기<input type="file" id="fx" accept=".xlsx" onchange="loadXlsx(this)"></label>
    <label class="file">🎙 회의록 JSON(선택)<input type="file" id="fj" accept=".json" multiple onchange="loadJson(this)"></label>
    <select id="b_m" onchange="render()" style="display:none"></select>
    <select id="b_p" onchange="render()" style="display:none"></select>
    <button onclick="print()" id="btnp" style="display:none">인쇄 / PDF 저장</button>
  </div>
  <div id="view">
    <div class="empty">
      <b>의정활동대장.xlsx</b>를 불러오면 시작합니다.<br>
      필요한 시트: 공약이행 · 의회활동 · 민원처리 · 보도홍보 (없는 시트는 건너뜀)<br>
      <span style="font-size:11.5px">모든 처리는 이 브라우저 안에서만 이루어지며, 파일이 서버로 전송·저장되지 않습니다.</span>
    </div>
  </div>
</div>
<footer>의정보고서 비서 ｜ 데이터는 브라우저에서만 처리(서버 저장 없음) ｜ 민원인 정보는 대장 단계에서 비식별 권장</footer>
<script>
// 임기 기준: 제12대 경기도의회 2026-07-01 ~ 2030-06-30
const PERIODS=(()=>{const a=[["전체 임기(2026.7~2030.6)","2026-07-01","2030-06-30"],["전반기(2026.7~2028.6)","2026-07-01","2028-06-30"],["후반기(2028.7~2030.6)","2028-07-01","2030-06-30"]];for(let y=2026;y<=2030;y++)a.push([y+"년",y+"-01-01",y+"-12-31"]);return a})();
const SHEETS=["공약이행","민원처리","의회활동","보도홍보"];
let D=null, fileName="";   // {시트명:{rows:[...]}}
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const fmt=v=>/^https?:\/\//.test(String(v))?'<a href="'+esc(v)+'" target="_blank" rel="noopener">원문</a>':esc(v);
const el=id=>document.getElementById(id);

function cellDate(v){ // xlsx 날짜(시리얼/문자열/Date) → YYYY-MM-DD
  if(v==null||v==="")return "";
  if(v instanceof Date)return v.toISOString().slice(0,10);
  if(typeof v==="number"){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10)}
  return String(v).trim().slice(0,10);
}
function loadXlsx(inp){
  const f=inp.files[0]; if(!f)return; fileName=f.name;
  const rd=new FileReader();
  rd.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
    D={};
    SHEETS.forEach(n=>{
      const ws=wb.Sheets[n]; if(!ws){D[n]={rows:[]};return}
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}).slice(1)
        .map(r=>r.map((c,i)=>i===1&&(n!=="공약이행")?cellDate(c):(c instanceof Date?c.toISOString().slice(0,10):String(c).trim())))
        .filter(r=>r.some(v=>v!==""));
      D[n]={rows};
    });
    setup();
  };
  rd.readAsArrayBuffer(f);
}
function loadJson(inp){ // 회의록_의원명.json → 의회활동에 없는 발언 보충
  if(!D){alert("먼저 대장 엑셀을 불러와 주세요.");inp.value="";return}
  const files=[...inp.files]; let left=files.length;
  files.forEach(f=>{
    const rd=new FileReader();
    rd.onload=e=>{
      try{
        const doc=JSON.parse(e.target.result);
        const known=new Set(D["의회활동"].rows.map(r=>r[0]+"|"+r[1]));
        (doc["발언목록"]||[]).forEach(x=>{
          if(!known.has(doc["의원명"]+"|"+x["일자"]))
            D["의회활동"].rows.push([doc["의원명"],x["일자"],x["유형"]||"상임위질의",(x["회의명"]||"")+" — 발언","","회의록시스템 발언 기록","",x["링크"]||"",""]);
        });
      }catch(err){alert(f.name+": JSON 형식 오류")}
      if(--left===0)setup();
    };
    rd.readAsText(f,"utf-8");
  });
}
function members(){
  return [...new Set(SHEETS.flatMap(n=>D[n].rows.map(r=>r[0])).filter(x=>x))];
}
function setup(){
  const ms=members();
  el("b_m").innerHTML='<option value="">의원 선택</option>'+ms.map(m=>'<option>'+esc(m)+'</option>').join("");
  if(ms.length===1)el("b_m").value=ms[0];
  el("b_p").innerHTML=PERIODS.map((p,i)=>'<option value="'+i+'">'+p[0]+'</option>').join("");
  ["b_m","b_p","btnp"].forEach(i=>el(i).style.display="");
  render();
}
function TBL(hd,rows,empty){return rows.length?'<table><tr>'+hd.map(x=>'<th>'+x+'</th>').join("")+'</tr>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+fmt(c==null?"":c)+'</td>').join("")+'</tr>').join("")+'</table>':'<p class="none">'+empty+'</p>'}
function render(){
  if(!D)return;
  const m=el("b_m").value, pi=+el("b_p").value||0;
  if(!m){el("view").innerHTML='<div class="empty">의원과 기간을 선택하면 의정보고서가 표시됩니다.</div>';return}
  const [plabel,ps,pe]=PERIODS[pi];
  const inR=d=>{d=String(d).slice(0,10);return d>=ps&&d<=pe};
  const acts=D["의회활동"].rows.filter(r=>r[0]===m&&inR(r[1])).sort((a,b)=>String(a[1]).localeCompare(String(b[1])));
  const pl=D["공약이행"].rows.filter(r=>r[0]===m);
  const mws=D["민원처리"].rows.filter(r=>r[0]===m&&inR(r[1]));
  const mdone=mws.filter(r=>r[6]==="회신완료").length;
  const mrate=mws.length?Math.round(mdone/mws.length*100):0;
  const prs=D["보도홍보"].rows.filter(r=>r[0]===m&&inR(r[1])).sort((a,b)=>String(a[1]).localeCompare(String(b[1])));
  const stat={};["완료","일부이행","추진중","구상","보류"].forEach(s=>stat[s]=pl.filter(r=>r[7]===s).length);
  const prate=pl.length?Math.round((stat["완료"]+stat["일부이행"]*.5)/pl.length*100):0;
  const atype={};acts.forEach(r=>{const t=r[2]||"기타";atype[t]=(atype[t]||0)+1});
  const mtype={};mws.forEach(r=>{const t=r[3]||"기타";mtype[t]=(mtype[t]||0)+1});
  el("view").innerHTML=
    '<div class="noprint">본문을 클릭해 문구를 바로 고칠 수 있습니다. 고친 그대로 [인쇄 / PDF 저장]에 반영됩니다. 파일: '+esc(fileName)+'</div>'+
    '<div class="share" contenteditable="true" spellcheck="false">'+
    '<h1>의정활동 보고서</h1><div class="ssub">'+esc(m)+' 의원 ｜ '+esc(plabel)+' ｜ 경기도의회 ｜ 작성: 정책지원관</div>'+
    '<h2>1. 활동 총괄</h2><div class="stat"><div><b>'+acts.length+'</b>의회 활동(건)</div><div><b>'+pl.length+'</b>공약(건)</div><div><b>'+mws.length+'</b>민원 접수(건)</div><div><b>'+prs.length+'</b>언론·홍보(건)</div></div>'+
    TBL(["의회활동 유형","건수"],Object.entries(atype),"기간 내 의회 활동 기록 없음")+
    '<h2>2. 공약 이행 현황</h2><div class="stat">'+["완료","일부이행","추진중","구상","보류"].map(s=>'<div><b>'+stat[s]+'</b>'+s+'</div>').join("")+'</div>'+
    (pl.length?'<div style="font-size:12px">종합 이행률 '+prate+'% (완료 100%·일부이행 50% 가중)</div><div class="bar"><i style="width:'+prate+'%"></i></div>':'')+
    TBL(["공약","분야","상태","최근 추진내용 / 다음 조치"],pl.map(r=>[r[2],r[3],r[7],(r[8]||"-")+(r[9]?" / 다음: "+r[9]:"")]),"공약 기록 없음")+
    '<h2>3. 의회 활동</h2>'+(acts.length?Object.keys(atype).map(t=>'<h3>'+esc(t)+' ('+atype[t]+'건)</h3>'+TBL(["일자","제목·안건","원문"],acts.filter(r=>(r[2]||"기타")===t).map(r=>[r[1],r[3],r[7]||"-"]),"")).join(""):'<p class="none">기간 내 의회 활동 기록 없음</p>')+
    '<h2>4. 민원 처리 (비식별 통계)</h2><div class="stat"><div><b>'+mws.length+'</b>접수</div><div><b>'+mdone+'</b>회신완료</div><div><b>'+mrate+'%</b>처리율</div></div>'+
    TBL(["유형","건수"],Object.entries(mtype),"기간 내 민원 기록 없음")+
    '<h2>5. 언론·홍보</h2>'+TBL(["일자","구분","제목","매체"],prs.map(r=>[r[1],r[2],r[3],r[4]]),"기간 내 보도 기록 없음")+
    '<div class="sfoot">본 자료는 의정활동대장에서 생성된 의정보고서 초안입니다. ｜ 생성일 '+new Date().toISOString().slice(0,10)+'</div></div>';
}
</script>
</body></html>
